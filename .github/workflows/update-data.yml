name: Update Supercazzola Data [DEPRECATO - usa scrape.yml]

# Questo workflow è stato sostituito da scrape.yml (pipeline unificata).
# I trigger sono stati rimossi per evitare esecuzioni duplicate.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Questo workflow è deprecato. Usa scrape.yml.'
        required: false

permissions:
  contents: write # Permette di fare il commit delle modifiche

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run script to evaluate text and update JSON
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_supercazzola.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Aggiungi solo se il file è cambiato
          git add public/data/supercazzola_data.json
          
          # Se non ci sono modifiche, esci con successo
          git diff --staged --quiet || (git commit -m "🤖 Dati Supercazzola aggiornati tramite AI" && git push)
