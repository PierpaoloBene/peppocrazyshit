name: Aggiorna Supercazzola Index

on:
  schedule:
    # Ogni giorno a mezzanotte (ora italiana = UTC+1/2)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # Permette di lanciare lo scraper manualmente dalla UI di GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze Python
        run: pip install feedparser requests

      - name: Esegui lo scraper
        run: python3 scripts/scrape_supercazzola.py

      - name: Commit e push dei dati aggiornati
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Aggiornamento automatico Supercazzola Index"
          file_pattern: 'public/data/supercazzola_data.json'
          commit_author: "GitHub Actions <actions@github.com>"
